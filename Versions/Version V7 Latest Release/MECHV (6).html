<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Embed Viewer v7</title>
<style>
body{margin:0;font-family:Arial;background:var(--bg,linear-gradient(135deg,#141e30,#243b55));color:white;overflow-y:scroll;transition:0.3s;}
header{padding:15px;text-align:center;font-size:24px;font-weight:bold;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);position:sticky;top:0;z-index:100;}
.controls{display:flex;justify-content:center;gap:10px;padding:10px;flex-wrap:wrap;}
input{width:40%;padding:10px;border-radius:10px;border:none;}
button{padding:10px 15px;border:none;border-radius:10px;cursor:pointer;background:#00c6ff;color:black;font-weight:bold;}
button:hover{transform:scale(1.05);} 
.danger{background:#ff4d4d;color:white;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:15px;padding:20px;padding-bottom:60px;}
.embed-card{position:relative;}
iframe{width:100%;height:320px;border:none;border-radius:14px;box-shadow:0 0 20px rgba(0,0,0,0.6);}

.top-buttons{position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:10;}
.small-btn{background:rgba(0,0,0,0.7);border:none;color:white;border-radius:6px;cursor:pointer;padding:4px 6px;font-size:12px;}

.panel{display:flex;gap:10px;padding:10px;overflow-x:auto;}
.card{background:rgba(255,255,255,0.1);padding:10px;border-radius:10px;cursor:pointer;display:flex;gap:8px;align-items:center;}
.delete-btn{background:#ff4d4d;border:none;border-radius:6px;color:white;cursor:pointer;padding:2px 6px;}
.section-title{padding-left:10px;font-weight:bold;opacity:0.8;}

.hidden-text{filter:blur(8px);}
</style>
</head>
<body>

<header>🚀 Multi Embed Viewer v7 (Advanced)</header>

<div class="controls">
<input type="text" id="urlInput" placeholder="Enter URL...">
<button onclick="addEmbed()">Embed</button>
<button onclick="saveBookmark()">⭐ Bookmark</button>
<button onclick="toggleStreamerMode()">🎥 Stream Mode</button>
<button onclick="setCustomBackground()">🎨 Background</button>
<button class="danger" onclick="clearEmbeds()">🧹 Clear</button>
</div>

<div class="section-title">📌 Bookmarks</div>
<div class="panel" id="bookmarks"></div>

<div class="section-title">🕘 History</div>
<div class="panel" id="history"></div>

<div class="grid" id="embedContainer"></div>

<script>
const bookmarksKey="myBookmarks";
const historyKey="myHistory";
const bgKey="customBG";
let streamerMode=false;

function formatURL(url){return url.startsWith('http')?url:'https://'+url;}

function processURL(url){
 if(url.includes("youtube.com/watch")){
  const id=url.split("v=")[1]?.split("&")[0];
  return `https://www.youtube.com/embed/${id}`;
 }
 return url;
}

function addEmbed(urlInputVal=null){
 const input=document.getElementById('urlInput');
 let url=urlInputVal||input.value.trim();
 if(!url) return;

 url=formatURL(url);
 const embedURL=processURL(url);

 const wrapper=document.createElement('div'); wrapper.className='embed-card';
 const iframe=document.createElement('iframe'); iframe.src=embedURL; iframe.allowFullscreen=true;

 const topBtns=document.createElement('div'); topBtns.className='top-buttons';

 const removeBtn=document.createElement('button'); removeBtn.innerText='X'; removeBtn.className='small-btn'; removeBtn.onclick=()=>wrapper.remove();
 const fullBtn=document.createElement('button'); fullBtn.innerText='⛶'; fullBtn.className='small-btn'; fullBtn.onclick=()=>iframe.requestFullscreen();
 const openBtn=document.createElement('button'); openBtn.innerText='↗'; openBtn.className='small-btn'; openBtn.onclick=()=>window.open(url,'_blank');
 const copyBtn=document.createElement('button'); copyBtn.innerText='📋'; copyBtn.className='small-btn'; copyBtn.onclick=()=>navigator.clipboard.writeText(url);

 topBtns.append(fullBtn,openBtn,copyBtn,removeBtn);
 wrapper.append(topBtns,iframe);
 document.getElementById('embedContainer').appendChild(wrapper);

 saveHistory(url);
 input.value='';
}

function clearEmbeds(){document.getElementById('embedContainer').innerHTML='';}

// ⭐ BOOKMARKS WITH RENAME
function saveBookmark(){
 const input=document.getElementById('urlInput');
 let url=input.value.trim();
 if(!url) return;
 url=formatURL(url);

 let name=prompt("Name this bookmark:", url);
 if(!name) name=url;

 let b=JSON.parse(localStorage.getItem(bookmarksKey))||[];
 b.push({name,url});
 localStorage.setItem(bookmarksKey,JSON.stringify(b));
 renderBookmarks();
}

function renameBookmark(i){
 let b=JSON.parse(localStorage.getItem(bookmarksKey))||[];
 let newName=prompt("Rename bookmark:", b[i].name);
 if(newName){b[i].name=newName; localStorage.setItem(bookmarksKey,JSON.stringify(b)); renderBookmarks();}
}

function deleteBookmark(i){let b=JSON.parse(localStorage.getItem(bookmarksKey))||[];b.splice(i,1);localStorage.setItem(bookmarksKey,JSON.stringify(b));renderBookmarks();}

function renderBookmarks(){
 const c=document.getElementById('bookmarks'); c.innerHTML='';
 let b=JSON.parse(localStorage.getItem(bookmarksKey))||[];

 b.forEach((item,i)=>{
  const d=document.createElement('div'); d.className='card';

  const t=document.createElement('span'); t.innerText=item.name;
  if(streamerMode) t.classList.add('hidden-text');
  t.onclick=()=>addEmbed(item.url);

  const rename=document.createElement('button'); rename.innerText='✏'; rename.className='delete-btn'; rename.onclick=(e)=>{e.stopPropagation();renameBookmark(i);};
  const del=document.createElement('button'); del.innerText='x'; del.className='delete-btn'; del.onclick=(e)=>{e.stopPropagation();deleteBookmark(i);};

  d.append(t,rename,del);
  c.appendChild(d);
 });
}

// HISTORY
function saveHistory(url){
 let h=JSON.parse(localStorage.getItem(historyKey))||[];
 h.unshift(url);
 h=h.slice(0,10);
 localStorage.setItem(historyKey,JSON.stringify(h));
 renderHistory();
}

function deleteHistory(i){let h=JSON.parse(localStorage.getItem(historyKey))||[];h.splice(i,1);localStorage.setItem(historyKey,JSON.stringify(h));renderHistory();}

function renderHistory(){
 const c=document.getElementById('history'); c.innerHTML='';
 let h=JSON.parse(localStorage.getItem(historyKey))||[];

 h.forEach((url,i)=>{
  const d=document.createElement('div'); d.className='card';

  const t=document.createElement('span'); t.innerText=url;
  if(streamerMode) t.classList.add('hidden-text');
  t.onclick=()=>addEmbed(url);

  const del=document.createElement('button'); del.innerText='x'; del.className='delete-btn'; del.onclick=(e)=>{e.stopPropagation();deleteHistory(i);};

  d.append(t,del);
  c.appendChild(d);
 });
}

// 🎥 STREAMER MODE
function toggleStreamerMode(){
 streamerMode=!streamerMode;
 renderBookmarks();
 renderHistory();
}

// 🎨 BACKGROUND
function setCustomBackground(){
 let url=prompt("Enter image URL (leave blank for default):");
 if(!url){
  localStorage.removeItem(bgKey);
  document.body.style.setProperty('--bg','linear-gradient(135deg,#141e30,#243b55)');
 } else {
  localStorage.setItem(bgKey,url);
  document.body.style.setProperty('--bg',`url(${url}) center/cover no-repeat`);
 }
}

// load bg
(function(){
 let bg=localStorage.getItem(bgKey);
 if(bg){document.body.style.setProperty('--bg',`url(${bg}) center/cover no-repeat`);} 
})();

renderBookmarks();
renderHistory();
</script>

</body>
</html>
