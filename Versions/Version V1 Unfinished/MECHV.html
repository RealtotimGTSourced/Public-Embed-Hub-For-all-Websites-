<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multi Embed Viewer</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 10px;
    }

    input {
      width: 60%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #00c6ff;
      color: black;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 10px;
      padding: 10px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    .image-preview {
      text-align: center;
      margin-top: 10px;
    }

    .image-preview img {
      max-width: 200px;
      border-radius: 10px;
      box-shadow: 0 0 10px black;
    }
  </style>
</head>
<body>

<header>🔥 Multi Website Embed Viewer</header>

<div class="controls">
  <input type="text" id="urlInput" placeholder="Enter website or YouTube URL...">
  <button onclick="addEmbed()">Embed</button>
  <button onclick="fetchImage()">Get Image</button>
</div>

<div class="grid" id="embedContainer"></div>

<div class="image-preview" id="imagePreview"></div>

<script>
  function formatURL(url) {
    if (!url.startsWith('http')) {
      return 'https://' + url;
    }
    return url;
  }

  function addEmbed() {
    const input = document.getElementById('urlInput');
    let url = input.value.trim();
    if (!url) return;

    url = formatURL(url);

    // Handle YouTube specially
    if (url.includes("youtube.com/watch")) {
      const videoId = url.split("v=")[1]?.split("&")[0];
      url = `https://www.youtube.com/embed/${videoId}`;
    }

    const iframe = document.createElement('iframe');
    iframe.src = url;

    document.getElementById('embedContainer').appendChild(iframe);
    input.value = '';
  }

  async function fetchImage() {
    const input = document.getElementById('urlInput');
    let url = input.value.trim();
    if (!url) return;

    url = formatURL(url);

    try {
      const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
      const data = await response.json();

      const imageUrl = data.data.image?.url;

      if (imageUrl) {
        const img = document.createElement('img');
        img.src = imageUrl;

        const container = document.getElementById('imagePreview');
        container.innerHTML = '';
        container.appendChild(img);
      } else {
        alert("No image found for this site.");
      }
    } catch (err) {
      alert("Failed to fetch image.");
    }
  }
</script>

</body>
</html>
