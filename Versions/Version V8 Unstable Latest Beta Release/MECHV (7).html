<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Embed Viewer v8</title>
<style>
body{margin:0;font-family:Arial;background:var(--bg,linear-gradient(135deg,#141e30,#243b55));color:white;overflow:hidden;}
header{padding:15px;text-align:center;font-size:24px;font-weight:bold;background:rgba(0,0,0,0.4);backdrop-filter:blur(10px);}
.controls{display:flex;justify-content:center;gap:10px;padding:10px;flex-wrap:wrap;}
input{width:40%;padding:10px;border-radius:10px;border:none;}
button{padding:10px 15px;border:none;border-radius:10px;cursor:pointer;background:#00c6ff;color:black;font-weight:bold;}

.tabs{display:flex;gap:5px;padding:10px;overflow-x:auto;background:rgba(0,0,0,0.3);} 
.tab{padding:8px 12px;background:rgba(255,255,255,0.1);border-radius:8px;cursor:pointer;}
.active{background:#00c6ff;color:black;}

.grid{display:none;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:15px;padding:20px;height:calc(100vh - 160px);overflow:auto;}
.grid.active{display:grid;}

.embed-card{position:relative;}
iframe,img{width:100%;height:320px;border:none;border-radius:14px;object-fit:cover;}

.top-buttons{position:absolute;top:8px;right:8px;display:flex;gap:5px;z-index:10;}
.small-btn{background:rgba(0,0,0,0.7);border:none;color:white;border-radius:6px;cursor:pointer;padding:4px 6px;font-size:12px;}
</style>
</head>
<body>

<header>🚀 Multi Embed Viewer v8 (Tabs + Smart Input)</header>

<div class="controls">
<input type="text" id="urlInput" placeholder="Enter URL or special input...">
<button onclick="addEmbed()">Add</button>
<button onclick="newTab()">➕ Tab</button>
</div>

<div class="tabs" id="tabs"></div>
<div id="tabContents"></div>

<script>
let tabCount=0;
let currentTab=0;

function createTab(name="Tab"){
 const tabId=tabCount++;

 const tabBtn=document.createElement('div');
 tabBtn.className='tab';
 tabBtn.innerText=name+" "+tabId;
 tabBtn.onclick=()=>switchTab(tabId);
 document.getElementById('tabs').appendChild(tabBtn);

 const grid=document.createElement('div');
 grid.className='grid';
 grid.id='tab-'+tabId;
 document.getElementById('tabContents').appendChild(grid);

 if(tabCount===1) switchTab(tabId);
}

function switchTab(id){
 currentTab=id;
 document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
 document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
 document.getElementById('tab-'+id).classList.add('active');
 document.getElementsByClassName('tab')[id].classList.add('active');
}

function newTab(){createTab("Tab");}

function parseInput(input){
 // special syntax
 if(input.includes("|")){
  const parts=input.split("|");
  const url=parts[0].trim();

  let type="normal";
  parts.forEach(p=>{
    if(p.includes("Type=animated")) type="animated";
  });

  return {url,type};
 }
 return {url:input,type:"normal"};
}

function addEmbed(){
 const input=document.getElementById('urlInput');
 let val=input.value.trim();
 if(!val) return;

 const parsed=parseInput(val);
 let url=parsed.url;

 if(!url.startsWith('http')) url='https://'+url;

 const wrapper=document.createElement('div'); wrapper.className='embed-card';
 const topBtns=document.createElement('div'); topBtns.className='top-buttons';

 const remove=document.createElement('button'); remove.innerText='X'; remove.className='small-btn'; remove.onclick=()=>wrapper.remove();

 let element;

 // animated image mode
 if(parsed.type==="animated"){
   element=document.createElement('img');
   element.src=url;
 } else {
   element=document.createElement('iframe');
   element.src=url;
   element.allowFullscreen=true;
 }

 const full=document.createElement('button'); full.innerText='⛶'; full.className='small-btn'; full.onclick=()=>element.requestFullscreen?.();
 const open=document.createElement('button'); open.innerText='↗'; open.className='small-btn'; open.onclick=()=>window.open(url,'_blank');

 topBtns.append(full,open,remove);
 wrapper.append(topBtns,element);

 document.getElementById('tab-'+currentTab).appendChild(wrapper);
 input.value='';
}

// init first tab
createTab("Main");
</script>

</body>
</html>
